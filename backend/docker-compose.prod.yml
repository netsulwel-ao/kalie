version: "3.9"

# ─────────────────────────────────────────────
#  PRODUCTION override — max security, no debug
#  Run: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ─────────────────────────────────────────────

services:
  api:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4 --no-access-log
    env_file:
      - .env.prod
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G

  db:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    restart: always

  nginx:
    image: nginx:alpine
    container_name: kalie_nginx_prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
    networks:
      - nexus_net
    restart: always
