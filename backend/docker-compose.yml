# ─────────────────────────────────────────────
#  Kalie — Base Docker Compose (backend only)
#  NÃO usar directamente — usa o docker-compose.yml na raiz do projecto
# ─────────────────────────────────────────────

services:
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: kalie_api
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kalie_net
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: kalie_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kalie}
      POSTGRES_USER: ${POSTGRES_USER:-kalie_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - kalie_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kalie_user} -d ${POSTGRES_DB:-kalie}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: kalie_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - kalie_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  kalie_net:
    driver: bridge
