# ═══════════════════════════════════════════════════════════════════
#  KALIE — docker compose up --build
#  Sobe tudo localmente: api, frontend, nginx, postgres, redis
#  Sem configurações cloud necessárias
# ═══════════════════════════════════════════════════════════════════

services:

  # ── 1. PostgreSQL (local) ────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: kalie_db
    environment:
      POSTGRES_DB: kalie_dev
      POSTGRES_USER: kalie_user
      POSTGRES_PASSWORD: kalie_dev_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/docker/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - kalie_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kalie_user -d kalie_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── 2. Redis (local) ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: kalie_redis
    command: >
      redis-server
      --requirepass kalie_redis_pass
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - kalie_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "kalie_redis_pass", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ── 3. Backend (FastAPI) ─────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: docker/api/Dockerfile.dev
    container_name: kalie_api
    env_file:
      - .env
    environment:
      # Sobrepõe o .env para apontar para os containers locais
      DATABASE_URL: postgresql+asyncpg://kalie_user:kalie_dev_pass@db:5432/kalie_dev
      REDIS_URL: redis://:kalie_redis_pass@redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kalie_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── 4. Frontend (Vite dev server) ────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: kalie_frontend
    env_file:
      - frontend/.env.local
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - kalie_net
    restart: unless-stopped

  # ── 5. Nginx (reverse proxy — une tudo em :80) ───────────────────
  nginx:
    image: nginx:alpine
    container_name: kalie_nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend
    networks:
      - kalie_net
    restart: unless-stopped

# ── Volumes persistentes ──────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  kalie_net:
    driver: bridge
