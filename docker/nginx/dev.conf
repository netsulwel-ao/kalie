# ═══════════════════════════════════════════════════════════════════
#  Nginx DEV — reverse proxy
#  http://localhost      → frontend (Vite)
#  http://localhost/api  → backend (FastAPI)
#  http://localhost/ws   → WebSocket (FastAPI)
#  http://localhost/docs → Swagger UI (FastAPI)
# ═══════════════════════════════════════════════════════════════════

upstream api {
    server api:8000;
}

upstream frontend {
    server frontend:5173;
}

server {
    listen 80;
    server_name localhost;

    # ── Segurança básica ──────────────────────────────────────────
    server_tokens off;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    client_max_body_size 20M;

    # ── API REST ──────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── Swagger / ReDoc (só em dev) ───────────────────────────────
    location /docs {
        proxy_pass http://api;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://api;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://api;
        proxy_set_header Host $host;
    }

    # ── Health check ──────────────────────────────────────────────
    location /health {
        proxy_pass http://api;
        proxy_set_header Host $host;
    }

    # ── WebSocket (jogos em tempo real, chat) ─────────────────────
    location /ws/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Vite HMR WebSocket ────────────────────────────────────────
    location /_vite/ {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # ── Frontend (tudo o resto) ───────────────────────────────────
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
