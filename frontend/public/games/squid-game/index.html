<!DOCTYPE html>
<html lang="pt-AO">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Squid Game — Luz Verde Luz Vermelha</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    touch-action: none;
  }
  #gameCanvas {
    display: block;
    cursor: pointer;
    max-width: 100vw;
    max-height: 100vh;
  }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
// ── Canvas setup ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const BASE_W = 800;
const BASE_H = 500;
let scale = 1;

function resize() {
  const ww = window.innerWidth, wh = window.innerHeight;
  scale = Math.min(ww / BASE_W, wh / BASE_H);
  canvas.width  = Math.floor(BASE_W * scale);
  canvas.height = Math.floor(BASE_H * scale);
  ctx.setTransform(scale, 0, 0, scale, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// ── Audio ──────────────────────────────────────────────────────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playShoot() {
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(880, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 0.25);
  g.gain.setValueAtTime(0.4, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
  o.start(); o.stop(audioCtx.currentTime + 0.3);
}

function playBeep(freq, dur, vol) {
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'sine'; o.frequency.value = freq;
  g.gain.setValueAtTime(vol || 0.3, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.start(); o.stop(audioCtx.currentTime + dur);
}

function playWin() {
  const notes = [523,659,784,1047];
  notes.forEach((f, i) => setTimeout(() => playBeep(f, 0.3, 0.4), i * 200));
}

function playLose() {
  const notes = [440,330,220,110];
  notes.forEach((f, i) => setTimeout(() => playBeep(f, 0.35, 0.35), i * 220));
}

function playTurn() {
  playBeep(220, 0.15, 0.2);
}

// ── Constants ─────────────────────────────────────────────────────────────────
const GROUND_Y    = 370;
const START_X     = 80;
const FINISH_X    = 700;
const ROBOT_X     = 720;
const ROBOT_Y     = GROUND_Y - 5;
const TOTAL_TIME  = 60;
const MAX_LIVES   = 3;
const STEP_SIZE   = 22;
const MOVE_WINDOW = 0.3; // seconds — if moved within this window when red → shot

// ── Game state ────────────────────────────────────────────────────────────────
let STATE = 'start'; // start | playing | win | lose
let lives, timer, playerX, playerAngle;
let isGreen, robotAngle, robotTargetAngle, robotRotating;
let lastMoveTime, particles, stepAnim, stepDir;
let deathAnim, deathAnimTimer, deathX, deathY;
let phaseTimer, nextPhaseIn;
let frameId;

function initGame() {
  lives         = MAX_LIVES;
  timer         = TOTAL_TIME;
  playerX       = START_X;
  playerAngle   = 0;
  isGreen       = true;
  robotAngle    = Math.PI;   // facing away
  robotTargetAngle = Math.PI;
  robotRotating = false;
  lastMoveTime  = -999;
  particles     = [];
  stepAnim      = 0;
  stepDir       = 1;
  deathAnim     = false;
  deathAnimTimer= 0;
  deathX        = START_X;
  deathY        = GROUND_Y;
  phaseTimer    = 0;
  nextPhaseIn   = 2.5;
}

// ── Particles ─────────────────────────────────────────────────────────────────
function spawnBlood(x, y) {
  for (let i = 0; i < 22; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      life: 1,
      decay: 0.025 + Math.random() * 0.03,
      r: 3 + Math.random() * 5,
      color: `hsl(${0 + Math.random()*20},100%,${35+Math.random()*20}%)`
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.18;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

// ── Drawing helpers ───────────────────────────────────────────────────────────
function drawBackground() {
  // Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  sky.addColorStop(0, '#0d1117');
  sky.addColorStop(1, '#1a0a2e');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, BASE_W, GROUND_Y);

  // Stars
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  const starSeed = [
    [50,30],[120,60],[200,20],[310,45],[420,15],[530,55],[640,30],[730,50],
    [80,90],[170,110],[260,80],[380,100],[500,70],[620,95],[700,75]
  ];
  starSeed.forEach(([x,y]) => {
    ctx.beginPath(); ctx.arc(x, y, 1.2, 0, Math.PI*2); ctx.fill();
  });

  // Ground
  const ground = ctx.createLinearGradient(0, GROUND_Y, 0, BASE_H);
  ground.addColorStop(0, '#1a3a1a');
  ground.addColorStop(1, '#0d1f0d');
  ctx.fillStyle = ground;
  ctx.fillRect(0, GROUND_Y, BASE_W, BASE_H - GROUND_Y);

  // Grass blades hint
  ctx.strokeStyle = '#2a5a2a';
  ctx.lineWidth = 1;
  for (let x = 10; x < BASE_W; x += 18) {
    ctx.beginPath();
    ctx.moveTo(x, GROUND_Y);
    ctx.lineTo(x - 3, GROUND_Y - 6);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x + 4, GROUND_Y);
    ctx.lineTo(x + 7, GROUND_Y - 5);
    ctx.stroke();
  }

  // Finish line
  const stripeW = 10;
  for (let y = GROUND_Y; y < BASE_H; y += stripeW * 2) {
    ctx.fillStyle = '#fff';
    ctx.fillRect(FINISH_X - 2, y, 4, stripeW);
  }
  // Flags
  drawFlag(FINISH_X, GROUND_Y - 70, '#ff0040');
  drawFlag(FINISH_X, GROUND_Y - 50, '#ff0040');

  // Start zone
  ctx.strokeStyle = '#ff69b4';
  ctx.lineWidth = 2;
  ctx.setLineDash([6,4]);
  ctx.beginPath();
  ctx.moveTo(START_X + 30, GROUND_Y);
  ctx.lineTo(START_X + 30, GROUND_Y + 30);
  ctx.stroke();
  ctx.setLineDash([]);

  // Distance track (dashed center line)
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 1;
  ctx.setLineDash([10,10]);
  ctx.beginPath();
  ctx.moveTo(START_X + 30, GROUND_Y - 1);
  ctx.lineTo(FINISH_X, GROUND_Y - 1);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawFlag(x, y, color) {
  ctx.strokeStyle = '#888'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y + 65); ctx.stroke();
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x + 20, y + 8);
  ctx.lineTo(x, y + 16);
  ctx.fill();
}
